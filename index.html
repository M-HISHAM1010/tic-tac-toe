<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #02020f;
      --panel: rgba(10, 14, 35, 0.85);
      --accent: #7afcff;
      --accent2: #ff4dff;
      --accent3: #74ff6f;
      --text: #f8f9ff;
      --shadow: 0 0 35px rgba(122, 255, 252, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, rgba(122, 255, 252, 0.15), transparent 20%),
        radial-gradient(circle at bottom right, rgba(255, 77, 255, 0.15), transparent 18%),
        linear-gradient(180deg, #05050d 0%, #0f1225 45%, #02020f 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page-shell {
      width: min(100%, 760px);
    }

    .glass-panel {
      backdrop-filter: blur(18px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      padding: 28px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), var(--shadow);
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.25rem);
      letter-spacing: 0.14em;
      margin: 0;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(122, 255, 252, 0.66), 0 0 8px rgba(255, 77, 255, 0.28);
    }

    .hero p {
      margin: 16px auto 0;
      max-width: 620px;
      color: #cdd6ff;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .badge {
      padding: 16px;
      border: 1px solid rgba(122, 255, 252, 0.16);
      border-radius: 18px;
      background: rgba(9, 17, 42, 0.8);
      box-shadow: 0 0 45px rgba(122, 255, 252, 0.08);
      font-weight: 600;
    }

    .badge span {
      color: var(--accent3);
    }

    .board {
      position: relative;
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(3, 1fr);
    }

    .win-line {
      position: absolute;
      inset: 0;
      display: block;
      background: linear-gradient(90deg, rgba(122, 252, 255, 0.95), rgba(255, 77, 255, 0.95));
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .win-line.visible {
      opacity: 1;
    }

    .win-line.line-0 {
      top: 16.66%;
      left: 0;
      width: 100%;
      height: 10px;
      transform: translateY(-50%);
    }

    .win-line.line-1 {
      top: 50%;
      left: 0;
      width: 100%;
      height: 10px;
      transform: translateY(-50%);
    }

    .win-line.line-2 {
      top: 83.33%;
      left: 0;
      width: 100%;
      height: 10px;
      transform: translateY(-50%);
    }

    .win-line.line-3 {
      left: 16.66%;
      top: 0;
      width: 10px;
      height: 100%;
      transform: translateX(-50%);
    }

    .win-line.line-4 {
      left: 50%;
      top: 0;
      width: 10px;
      height: 100%;
      transform: translateX(-50%);
    }

    .win-line.line-5 {
      left: 83.33%;
      top: 0;
      width: 10px;
      height: 100%;
      transform: translateX(-50%);
    }

    .win-line.line-6 {
      top: 50%;
      left: 50%;
      width: 140%;
      height: 10px;
      transform: translate(-50%, -50%) rotate(45deg);
    }

    .win-line.line-7 {
      top: 50%;
      left: 50%;
      width: 140%;
      height: 10px;
      transform: translate(-50%, -50%) rotate(-45deg);
    }

    .cell {
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.07));
      border-radius: 22px;
      font-size: clamp(2.25rem, 5vw, 4rem);
      color: transparent;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(122, 255, 252, 0.15), transparent 28%),
        radial-gradient(circle at 70% 80%, rgba(255, 77, 255, 0.14), transparent 22%);
      opacity: 0.8;
    }

    .cell span {
      position: relative;
    }

    .cell.active {
      border-color: rgba(122, 255, 252, 0.75);
      color: var(--text);
    }

    .cell.x::after,
    .cell.o::after {
      content: attr(data-symbol);
      position: relative;
      z-index: 1;
    }

    .cell.x {
      color: #7afcff;
      text-shadow: 0 0 18px rgba(122, 252, 255, 0.8);
    }

    .cell.o {
      color: #ff4dff;
      text-shadow: 0 0 18px rgba(255, 77, 255, 0.8);
    }

    .cell:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .select-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #cdd6ff;
      font-size: 0.95rem;
      padding: 10px 16px;
      border: 1px solid rgba(122, 255, 252, 0.18);
      border-radius: 999px;
      background: rgba(11, 18, 44, 0.72);
      box-shadow: 0 0 20px rgba(122, 252, 255, 0.12);
    }

    .select-label select {
      min-width: 140px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(122, 255, 252, 0.35);
      background: rgba(8, 12, 30, 0.95);
      color: #f8f9ff;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 0 18px rgba(122, 255, 252, 0.12);
    }

    .select-label select:hover,
    .select-label select:focus {
      border-color: rgba(255, 77, 255, 0.65);
    }

    .select-label select:disabled {
      background: rgba(12, 16, 36, 0.9);
      border-color: rgba(122, 255, 252, 0.12);
      color: rgba(196, 213, 255, 0.65);
      cursor: not-allowed;
      box-shadow: none;
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .neon-button {
      border: none;
      padding: 14px 30px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7afcff, #ff4dff);
      color: #05050f;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(122, 255, 252, 0.4), 0 0 28px rgba(255, 77, 255, 0.25);
      transition: transform 0.16s ease;
    }

    .neon-button:hover {
      transform: scale(1.02);
    }

    .neon-button.alt {
      background: linear-gradient(135deg, rgba(122, 252, 255, 0.15), rgba(255, 77, 255, 0.15));
      color: #dbe2ff;
      border: 1px solid rgba(122, 255, 252, 0.25);
      margin-right: 12px;
    }

    .footer {
      text-align: center;
      margin-top: 26px;
      color: #9bb2ff;
    }

    @media (max-width: 520px) {
      .board {
        gap: 12px;
      }

      .badge {
        font-size: 0.95rem;
      }
    }

    .mode-selector {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      padding: 40px 0;
    }

    .mode-selector h2 {
      font-size: 1.5rem;
      margin: 0;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="glass-panel">
      <header class="hero">
        <h1>Neon Tic Tac Toe</h1>
        <p>Simple local play in the browser with electric style.</p>
      </header>

      <section class="scoreboard">
        <div class="badge">Current: <span id="currentPlayer">X</span></div>
        <div class="badge">Result: <span id="status">Game on</span></div>
      </section>

      <div class="board" id="board">
        <div class="win-line" id="winLine"></div>
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>

      <div class="actions">
        <button id="restart" class="neon-button">Restart</button>
      </div>

      <footer class="footer"></footer>
    </div>
  </div>

  <script>
    const statusElement = document.getElementById("status");
    const currentPlayerElement = document.getElementById("currentPlayer");
    const restartButton = document.getElementById("restart");
    const cells = Array.from(document.querySelectorAll(".cell"));

    const winningLines = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6],
    ];

    let boardState = Array(9).fill("");
    let currentPlayer = "x";
    let gameActive = true;
    let gameMode = null; // "pvp" or "ai"
    let aiDifficulty = null; // "easy", "medium", "hard"
    let isAIThinking = false;

    function updateStatus(message) {
      statusElement.textContent = message;
    }

    function setCurrentPlayer(player) {
      currentPlayer = player;
      currentPlayerElement.textContent = player.toUpperCase();
    }

    function getAvailableMoves(position) {
      return position.map((value, index) => (value === "" ? index : null)).filter((move) => move !== null);
    }

    function findWinningLine(position, player) {
      return winningLines.find((line) =>
        line.every((index) => position[index] === player)
      );
    }

    function showWinningLine(line) {
      const winLine = document.getElementById("winLine");
      if (!winLine) {
        return;
      }
      winLine.className = "win-line visible";
      const lineIndex = winningLines.findIndex(
        (currentLine) => currentLine.join(",") === line.join(",")
      );
      winLine.classList.add(`line-${lineIndex}`);
    }

    function countLine(position, player) {
      let count = 0;
      winningLines.forEach((line) => {
        const lineCount = line.filter((index) => position[index] === player).length;
        if (lineCount === 2 && line.some((index) => position[index] === "")) {
          count += 10;
        } else if (lineCount === 1) {
          count += 1;
        }
      });
      return count;
    }

    function evaluateBoard(position) {
      const aiWin = findWinningLine(position, "o");
      if (aiWin) return 100;

      const playerWin = findWinningLine(position, "x");
      if (playerWin) return -100;

      const aiScore = countLine(position, "o");
      const playerScore = countLine(position, "x");
      return aiScore - playerScore;
    }

    function minimax(position, depth, isMaximizing, maxDepth) {
      const available = getAvailableMoves(position);

      if (findWinningLine(position, "o")) return 100 - depth;
      if (findWinningLine(position, "x")) return -100 + depth;
      if (available.length === 0) return 0;

      if (depth >= maxDepth) return evaluateBoard(position);

      if (isMaximizing) {
        let bestScore = -Infinity;
        for (let move of available) {
          const newPosition = [...position];
          newPosition[move] = "o";
          const score = minimax(newPosition, depth + 1, false, maxDepth);
          bestScore = Math.max(score, bestScore);
        }
        return bestScore;
      } else {
        let bestScore = Infinity;
        for (let move of available) {
          const newPosition = [...position];
          newPosition[move] = "x";
          const score = minimax(newPosition, depth + 1, true, maxDepth);
          bestScore = Math.min(score, bestScore);
        }
        return bestScore;
      }
    }

    function getAIMove() {
      const available = getAvailableMoves(boardState);
      if (available.length === 0) return null;

      let maxDepth = 9;
      if (aiDifficulty === "easy") {
        return available[Math.floor(Math.random() * available.length)];
      } else if (aiDifficulty === "medium") {
        maxDepth = 6;
        if (Math.random() < 0.3) {
          return available[Math.floor(Math.random() * available.length)];
        }
      }

      let bestScore = -Infinity;
      let bestMove = available[0];

      for (let move of available) {
        const newPosition = [...boardState];
        newPosition[move] = "o";
        const score = minimax(newPosition, 0, false, maxDepth);
        if (score > bestScore) {
          bestScore = score;
          bestMove = move;
        }
      }

      return bestMove;
    }

    function makeAIMove() {
      if (!gameActive || isAIThinking) return;

      isAIThinking = true;
      updateStatus("AI is thinking...");

      setTimeout(() => {
        const move = getAIMove();
        if (move !== null) {
          applyMove(move, "o");

          const winningLine = findWinningLine(boardState, "o");
          if (winningLine) {
            updateStatus("🤖 AI Wins!");
            showWinningLine(winningLine);
            gameActive = false;
            isAIThinking = false;
            return;
          }

          if (boardState.every((value) => value)) {
        updateStatus("🎲 Draw!");
            isAIThinking = false;
            return;
          }

          setCurrentPlayer("x");
          updateStatus("Your turn");
        }
        isAIThinking = false;
      }, 800);
    }

    function showGameModeSelection() {
      const actions = document.querySelector(".actions");
      const scoreboard = document.querySelector(".scoreboard");

      scoreboard.style.display = "none";
      actions.innerHTML = `
        <button id="pvpBtn" class="neon-button">👥 Human vs Human</button>
        <button id="aiBtn" class="neon-button">🤖 Human vs AI</button>
      `;

      document.getElementById("pvpBtn").addEventListener("click", () => {
        gameMode = "pvp";
        startGame();
      });

      document.getElementById("aiBtn").addEventListener("click", () => {
        showDifficultySelection();
      });
    }

    function showDifficultySelection() {
      const actions = document.querySelector(".actions");
      const scoreboard = document.querySelector(".scoreboard");

      scoreboard.style.display = "none";
      actions.innerHTML = `
        <button id="easyBtn" class="neon-button">🟢 Easy</button>
        <button id="mediumBtn" class="neon-button">🟡 Medium</button>
        <button id="hardBtn" class="neon-button">🔴 Hard</button>
      `;

      document.getElementById("easyBtn").addEventListener("click", () => {
        gameMode = "ai";
        aiDifficulty = "easy";
        startGame();
      });

      document.getElementById("mediumBtn").addEventListener("click", () => {
        gameMode = "ai";
        aiDifficulty = "medium";
        startGame();
      });

      document.getElementById("hardBtn").addEventListener("click", () => {
        gameMode = "ai";
        aiDifficulty = "hard";
        startGame();
      });
    }

    function startGame() {
      const board = document.getElementById("board");
      const actions = document.querySelector(".actions");
      const scoreboard = document.querySelector(".scoreboard");

      board.innerHTML = `
        <div class="win-line" id="winLine"></div>
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      `;

      cells.length = 0;
      cells.push(...Array.from(document.querySelectorAll(".cell")));

      scoreboard.style.display = "grid";
      actions.innerHTML = `<button id="restart" class="neon-button">Restart</button>`;
      actions.style.display = "flex";

      document.getElementById("restart").addEventListener("click", () => {
        gameMode = null;
        aiDifficulty = null;
        showGameModeSelection();
      });

      resetBoard();

      cells.forEach((cell) => cell.addEventListener("click", handleCellClick));
    }

    function getRandomStartingPlayer() {
      return Math.random() < 0.5 ? "x" : "o";
    }

    function resetBoard() {
      boardState = Array(9).fill("");
      gameActive = true;
      isAIThinking = false;
      const startingPlayer = getRandomStartingPlayer();
      setCurrentPlayer(startingPlayer);

      if (gameMode === "ai") {
        if (startingPlayer === "x") {
          updateStatus("Your turn");
        } else {
          updateStatus("AI is thinking...");
          setTimeout(makeAIMove, 500);
        }
      } else {
        updateStatus(`Game on — ${startingPlayer.toUpperCase()} starts`);
      }

      cells.forEach((cell) => {
        cell.classList.remove("active", "x", "o");
        cell.removeAttribute("data-symbol");
      });

      const winLine = document.getElementById("winLine");
      if (winLine) {
        winLine.className = "win-line";
      }
    }

    function handleCellClick(event) {
      const cell = event.currentTarget;
      const index = Number(cell.dataset.index);

      if (!gameActive || boardState[index] || isAIThinking) {
        return;
      }

      applyMove(index, currentPlayer);

      const winningLine = findWinningLine(boardState, currentPlayer);
      if (winningLine) {
        if (gameMode === "ai") {
          updateStatus("🏆 You Win!");
        } else {
          const winner = currentPlayer === "x" ? "X" : "O";
          updateStatus(`🏆 Player ${winner} Wins!`);
        }
        showWinningLine(winningLine);
        gameActive = false;
        return;
      }

      if (boardState.every((value) => value)) {
        updateStatus("🎲 Draw!");
        gameActive = false;
        return;
      }

      if (gameMode === "ai") {
        setCurrentPlayer("o");
        makeAIMove();
      } else {
        const nextPlayer = currentPlayer === "x" ? "o" : "x";
        setCurrentPlayer(nextPlayer);
        updateStatus(`${nextPlayer.toUpperCase()} turn`);
      }
    }

    function applyMove(index, player) {
      boardState[index] = player;
      const cell = cells[index];
      cell.classList.add("active", player);
      cell.dataset.symbol = player.toUpperCase();
    }

    restartButton.addEventListener("click", () => {
      gameMode = null;
      aiDifficulty = null;
      showGameModeSelection();
    });

    showGameModeSelection();
  </script>
</body>
</html>
